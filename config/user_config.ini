[Settings]
; =========================
; 港澳台频道专用配置
; =========================

; 使用港澳台频道模板
source_file = config/user_demo.txt
; 结果输出文件
final_file = output/cold_result.m3u

; 开启更新
open_update = True
; 开启订阅源
open_subscribe = True
; 开启本地源
open_local = True
; 开启历史记录（提升后续更新效率）
open_history = True

; 开启测速
open_speed_test = True
; 开启分辨率过滤
open_filter_resolution = True
; 开启速率过滤
open_filter_speed = True

; 港澳台源质量参差不齐，适当降低门槛
min_resolution = 720x480
min_speed = 0.2
; 单个频道保留更多接口（港澳台源不稳定，多留备用）
urls_limit = 8

; 测速并发数（港澳台海外源延迟较高，适当降低并发）
speed_test_limit = 3
; 测速超时适当放宽（海外源延迟较高）
speed_test_timeout = 15
; 请求超时
request_timeout = 15

; 开启补偿机制（港澳台源较少，避免结果为空）
open_supply = True
; 开启未匹配频道分类（收集更多可用频道）
open_unmatch_category = True

; 支持 IPv4 和 IPv6
ipv_type = all
ipv_type_prefer = auto

; 生成 m3u 格式（支持台标）
open_m3u_result = True
; 开启 EPG
open_epg = True
; 开启页面服务
open_service = True

; 定时更新（每12小时）
update_mode = interval
update_interval = 12
update_startup = True
