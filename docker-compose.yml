services:
  iptv-api:
    image: guovern/iptv-api:latest
    container_name: iptv-api
    restart: unless-stopped
    tty: true
    stdin_open: true

    ports:
      - "80:8080"

    volumes:
      - ./config:/iptv-api/config
      - ./output:/iptv-api/output

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      PUBLIC_SCHEME: "http"
      # Replace with your public domain or IP
      PUBLIC_DOMAIN: "127.0.0.1"
      PUBLIC_PORT: "80"
      NGINX_HTTP_PORT: "8080"
      CDN_URL: ""
      HTTP_PROXY: "http://host.docker.internal:6738"
      HTTPS_PROXY: "http://host.docker.internal:6738"
      ALL_PROXY: "http://host.docker.internal:6738"
      http_proxy: "http://host.docker.internal:6738"
      https_proxy: "http://host.docker.internal:6738"
      all_proxy: "http://host.docker.internal:6738"